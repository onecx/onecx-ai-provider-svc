---
openapi: 3.0.3
info:
  title: onecx-ai-provider internal service
  version: 1.0.0
servers:
  - url: "http://onecx-ai-provider-svc:8080"
tags:
  - name: providerInternal
  - name: agentInternal
  - name: toolInternal
  - name: modelInternal
  - name: scaffoldInternal
  - name: runtimeConfigInternal
  - name: skillInternal
  - name: agentGroupInternal
