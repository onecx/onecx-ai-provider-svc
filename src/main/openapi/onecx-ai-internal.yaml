components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://oauth.simple.api/token
          scopes:
            ocx-ai:all: Grants access to all operations
            ocx-ai:read: Grants read access
            ocx-ai:write: Grants write access
            ocx-ai:delete: Grants access to delete operations
  schemas:
    AgentFilter:
      type: object
      properties:
        key:
          type: string
          enum: [ APP_ID ]
        value:
          type: string
    AgentAbstract:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        additionalPrompt: { type: string }
        a2aEnabled: { type: boolean }
        status: { $ref: '#/components/schemas/AgentStatus' }
        filter:
          $ref: '#/components/schemas/AgentFilter'
    Agent:
      type: object
      properties:
        modificationCount: { format: int32, type: integer }
        creationDate: { $ref: '#/components/schemas/OffsetDateTime' }
        creationUser: { type: string }
        modificationDate: { $ref: '#/components/schemas/OffsetDateTime' }
        modificationUser: { type: string }
        id: { type: string }
        name: { type: string }
        description: { type: string }
        additionalPrompt: { type: string }
        a2aEnabled: { type: boolean }
        status: { $ref: '#/components/schemas/AgentStatus' }
        filter:
          $ref: '#/components/schemas/AgentFilter'
        model:
          $ref: '#/components/schemas/Model'
        scaffold:
          $ref: '#/components/schemas/Scaffold'
        runtimeConfig:
          $ref: '#/components/schemas/RuntimeConfig'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AgentGroup'
    CreateAgentRequest:
      type: object
      required: [ name ]
      properties:
        name: { type: string }
        description: { type: string }
        additionalPrompt: { type: string }
        a2aEnabled: { type: boolean }
        status: { $ref: '#/components/schemas/AgentStatus' }
        filter: { $ref: '#/components/schemas/AgentFilter' }
        model: { $ref: '#/components/schemas/Model' }
        scaffold: { $ref: '#/components/schemas/Scaffold' }
        runtimeConfig: { $ref: '#/components/schemas/RuntimeConfig' }
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AgentGroup'
    UpdateAgentRequest:
      type: object
      required: [ modificationCount ]
      properties:
        modificationCount: { format: int32, type: integer }
        name: { type: string }
        description: { type: string }
        additionalPrompt: { type: string }
        a2aEnabled: { type: boolean }
        status: { $ref: '#/components/schemas/AgentStatus' }
        filter: { $ref: '#/components/schemas/AgentFilter' }
        model: { $ref: '#/components/schemas/Model' }
        scaffold: { $ref: '#/components/schemas/Scaffold' }
        runtimeConfig: { $ref: '#/components/schemas/RuntimeConfig' }
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AgentGroup'
    AgentSearchCriteria:
      type: object
      properties:
        id: { type: string }
